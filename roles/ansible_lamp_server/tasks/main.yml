---
##############################
# tasks file for Apache server
##############################
- name: Install packages
  apt:
    name:
      - apache2
      - ufw
      - php 
      - libapache2-mod-php 
      - php-mysql
    state: present
    update_cache: yes

- name: Ensure apache2 is enabled and started
  service:
    name: "{{ item }}"
    state: started
    enabled: yes
  loop:
    - apache2
    - ufw

- name: Get PHP version
  command: php -r "echo PHP_MAJOR_VERSION.'.'.PHP_MINOR_VERSION;"
  register: php_version
  changed_when: false

- name: Enable PHP module
  command: a2enmod php{{ php_version.stdout }}
  notify: Restart apache2
    
- name: Set DirectoryIndex
  lineinfile:
    path: /etc/apache2/mods-enabled/dir.conf
    regexp: '^DirectoryIndex'
    line: 'DirectoryIndex index.php index.html'

- name: Remove default index.html
  file:
    path: /var/www/html/index.html
    state: absent

- name: Allow HTTP through firewall
  ufw:
    rule: allow
    name: Apache
  ignore_errors: yes

- name: Deploy website template
  template:
    src: index.php.j2
    dest: /var/www/html/index.php
    owner: www-data
    group: www-data
    mode: '0644'
  notify: Restart apache2

###################################
# tasks file for MariaDB server
###################################
- name: Install MariaDB packages
  apt:
    name:
      - mariadb-server
      - python3-pymysql
    state: present
    update_cache: yes

- name: Ensure MariaDB service is started and enabled
  service:
    name: mariadb
    state: started
    enabled: yes

- name: Create database
  community.mysql.mysql_db:
    name: hotel_db
    state: present
    login_unix_socket: /run/mysqld/mysqld.sock

- name: Create enquiries table
  community.mysql.mysql_query:
    login_db: hotel_db
    login_unix_socket: /run/mysqld/mysqld.sock
    query: |
      CREATE TABLE IF NOT EXISTS enquiries (
          id INT AUTO_INCREMENT PRIMARY KEY,
          name VARCHAR(100),
          email VARCHAR(100),
          phone VARCHAR(20),
          message TEXT,
          created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP
      );

- name: Create database user
  community.mysql.mysql_user:
    name: hotel_user
    password: password123
    priv: 'hotel_db.*:ALL'
    host: localhost
    state: present
    login_unix_socket: /run/mysqld/mysqld.sock
