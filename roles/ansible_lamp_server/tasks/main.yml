---
# tasks file for Apache server

- name: Install packages
  apt:
    name:
      - apache2
      - ufw
      - php 
      - libapache2-mod-php 
      - php-mysql
    state: present
    update_cache: yes

- name: Ensure apache2 is enabled and started
  service:
    name: "{{ item }}"
    state: started
    enabled: yes
  loop:
    - apache2
    - ufw
    
- name: Enable php
  command: sudo a2enmod php
  notify: Restart apache2

- name: Allow HTTP through firewall
  ufw:
    rule: allow
    name: Apache
  ignore_errors: yes

- name: Deploy website template
  template:
    src: index.html.j2
    dest: /var/www/html/index.php
    owner: www-data
    group: www-data
    mode: '0644'
  notify: Restart apache2
